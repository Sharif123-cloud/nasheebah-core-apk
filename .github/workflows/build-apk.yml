name: Build Nasheebah Core APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set ANDROID_HOME from runner env ─────────────────────
      - name: Set ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "Android SDK at: $ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/build-tools/ || true

      # ── 4. Install Gradle 8.4 (no wrapper JAR needed) ──────────
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-read-only: false

      # ── 5. Cache Gradle dependencies ────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Build Debug APK ──────────────────────────────────────
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 7. Build Release APK (unsigned) ─────────────────────────
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 8. List outputs ─────────────────────────────────────────
      - name: List Build Outputs
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      # ── 9. Upload Debug APK ─────────────────────────────────────
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: nasheebah-core-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 10. Upload Release APK ───────────────────────────────────
      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: nasheebah-core-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 11. Summary ──────────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "## Nasheebah Core Build" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | Nasheebah Core v2.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "📦 Download the APK from the **Artifacts** section." >> $GITHUB_STEP_SUMMARY
          echo "Engineered by **Sserunjogi Sharif** +256787816686" >> $GITHUB_STEP_SUMMARY
